<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse — Prototype</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <style>
    html, body { height: 100%; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .sparkline { stroke-width: 1.5; fill: none; }
    .card-shadow { box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06); }
    .lane-shadow { box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03); }
    details > summary { list-style: none; cursor: pointer; }
    details > summary::-webkit-details-marker { display: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="root">
    <div class="min-h-screen flex items-center justify-center text-slate-400">Loading prototype…</div>
  </div>

    /* === DATA === */

    const METRICS = [

        spark: [91,90,92,91,93,92,93,94,93,94,94,94] },
      { label: 'Items created', value: '89', delta: '+12 today', tone: 'up',
        spark: [5,6,8,7,9,11,10,12,11,13,12,14] },

    const CLIENT_FACING = [
      {

          subject: 'Quick follow-up on the case study',
          body: 'Hi Jane,\n\nWanted to circle back on the case study I sent over last week. A few of the points that matched what you described most closely were the onboarding time reduction and the per-client reporting flow.\n\nWould next Tuesday or Thursday afternoon work for a 15-minute call?\n\nBest,\nSam',
        },
        cost: '1 email send · Reversible: no',
        age: '8m',
      },
      {
        id: 'c2', type: 'review', icon: 'database',
        subaccount: 'beta', agent: 'CRM Hygiene Agent',
        title: 'Update 4 HubSpot contacts with enrichment data',
        reasoning: 'Four contacts in the Q2 pipeline are missing job titles and company size. Third-party enrichment returned high-confidence matches for all four.',
        evidence: {

      },
      {
        id: 'c3', type: 'review', icon: 'target',
        subaccount: 'gamma', agent: 'Campaign Optimiser',
        title: 'Pause "Spring Sale — Display" campaign',
        reasoning: 'CTR has dropped 62% over 14 days. CPA is 3.2× the client target. Recommend pausing and rebuilding the creative before relaunch.',
        evidence: {

            { label: 'CPA (14d)', value: '$184 · target $57' },

          ],

    const INTERNAL = [
      { id: 'i1', type: 'task', icon: 'doc', subaccount: 'acme', agent: 'Content Agent',
        title: 'Blog draft "10 GEO mistakes most agencies make" is ready', age: '32m' },
      { id: 'i2', type: 'review', icon: 'doc', subaccount: 'beta', agent: 'Research Agent',
        title: 'Internal summary of Q1 competitor moves', age: '54m' },
      { id: 'i3', type: 'task', icon: 'memory', subaccount: 'acme', agent: 'Knowledge Agent',
        title: 'Memory block "acme-positioning" updated with new messaging', age: '1h' },
      { id: 'i4', type: 'task', icon: 'doc', subaccount: 'delta', agent: 'Finance Agent',

      { id: 'i5', type: 'failed_run', icon: 'alert', subaccount: 'beta', agent: 'CRM Hygiene Agent',
        title: 'Run failed: HubSpot rate limit hit during enrichment', age: '2h' },
      { id: 'i6', type: 'task', icon: 'doc', subaccount: 'gamma', agent: 'SEO Agent',
        title: 'SEO audit complete: 12 findings, 4 critical', age: '3h' },
      { id: 'i7', type: 'review', icon: 'doc', subaccount: 'acme', agent: 'Meeting Agent',
        title: 'Meeting notes synthesised from the Tuesday standup', age: '4h' },
      { id: 'i8', type: 'task', icon: 'doc', subaccount: 'all', agent: 'Portfolio Agent',

    const MAJOR = [
      {

        title: 'Increase monthly ad budget by $500/mo for Acme Corp',
        reasoning: 'Current ROAS on the Google Ads account is 4.2×. Simulation suggests another $500/mo at the same ROAS would add ~$2,100/mo in revenue. This exceeds the 20% monthly-change ceiling you set for Acme.',
        evidence: {
          kind: 'metrics',

            { label: 'Current monthly budget', value: '$2,500' },
            { label: 'Proposed monthly budget', value: '$3,000' },
            { label: 'Current ROAS (30d)', value: '4.2×' },
            { label: 'Simulated revenue lift', value: '+$2,100/mo at 4.2× ROAS' },
            { label: 'Ceiling check', value: 'Change exceeds 20% ceiling (this change: 20.0%)' },
          ],
        },
        cost: '+$500/mo recurring · Irreversible during the month · Scope: Acme Corp only',
        acknowledgment: 'I understand this is a recurring budget increase that affects Acme Corp\u2019s monthly spend.',
        age: '15m',
      },
    ];

    const HISTORY = [
      { type: 'review', status: 'approved', subject: 'Send weekly digest to Acme', actor: 'sam@agency.co', severity: '—', subaccount: 'acme', when: 'Today 09:42' },
      { type: 'agent_run', status: 'completed', subject: 'Competitor brief for Gamma', actor: 'Research Agent', severity: '—', subaccount: 'gamma', when: 'Today 09:14' },
      { type: 'review', status: 'approved with edits', subject: 'Update CRM: 3 contacts (Beta)', actor: 'sam@agency.co', severity: '—', subaccount: 'beta', when: 'Today 08:58' },
      { type: 'health_finding', status: 'resolved', subject: 'Delta: reporting agent had empty skill allowlist', actor: 'system', severity: 'warning', subaccount: 'delta', when: 'Yesterday 18:20' },
      { type: 'agent_run', status: 'completed', subject: 'Monthly performance report · Acme', actor: 'Reporting Agent', severity: '—', subaccount: 'acme', when: 'Yesterday 17:02' },
      { type: 'review', status: 'rejected', subject: 'Draft reply to inbound support query', actor: 'sam@agency.co', severity: '—', subaccount: 'gamma', when: 'Yesterday 14:11' },
      { type: 'playbook_run', status: 'completed', subject: 'GEO audit playbook · Beta', actor: 'System', severity: '—', subaccount: 'beta', when: 'Yesterday 11:40' },
    ];

    const LANES = [
      { id: 'client', label: 'Client-facing', badge: 'bg-rose-100 text-rose-700 ring-rose-200',
        tint: 'from-rose-50 to-white', chip: 'bg-rose-50 text-rose-700 ring-rose-200',
        description: 'Actions that affect clients or external systems. Review each one carefully.' },
      { id: 'internal', label: 'Internal', badge: 'bg-slate-100 text-slate-700 ring-slate-200',
        tint: 'from-slate-50 to-white', chip: 'bg-slate-50 text-slate-700 ring-slate-200',
        description: 'Low-stakes internal work. Reversible. Approve in bulk if the context looks right.' },
      { id: 'major', label: 'Major', badge: 'bg-amber-100 text-amber-800 ring-amber-200',
        tint: 'from-amber-50 to-white', chip: 'bg-amber-50 text-amber-800 ring-amber-200',
        description: 'Big decisions with cost, multi-client, or irreversible impact. Explicit acknowledgement required.' },
    ];
    const LANE_BY_ID = Object.fromEntries(LANES.map(l => [l.id, l]));

    const ATTENTION_COUNT = CLIENT_FACING.length + INTERNAL.length + MAJOR.length;


    /* === ICONS === */
    const Icon = ({ name, className = 'w-4 h-4' }) => {
      const paths = {
        mail: <><path d="M3 6.5A2.5 2.5 0 0 1 5.5 4h13A2.5 2.5 0 0 1 21 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-13A2.5 2.5 0 0 1 3 17.5v-11Z" /><path d="m3.5 7 8.5 6 8.5-6" /></>,
        database: <><ellipse cx="12" cy="5.5" rx="8" ry="2.5" /><path d="M4 5.5v13c0 1.4 3.6 2.5 8 2.5s8-1.1 8-2.5v-13" /><path d="M4 11.5c0 1.4 3.6 2.5 8 2.5s8-1.1 8-2.5" /></>,
        target: <><circle cx="12" cy="12" r="8.5" /><circle cx="12" cy="12" r="4.5" /><circle cx="12" cy="12" r="1.25" fill="currentColor" /></>,
        doc: <><path d="M6 3h8l4 4v14H6z" /><path d="M14 3v4h4" /><path d="M8.5 12h7M8.5 15h7M8.5 18h4.5" /></>,
        memory: <><rect x="4" y="4" width="16" height="16" rx="3" /><path d="M8 9h8M8 13h5M8 17h8" /></>,
        alert: <><path d="M12 3 2.5 20h19L12 3Z" /><path d="M12 10v4.5" /><circle cx="12" cy="17.5" r="0.8" fill="currentColor" /></>,
        coin: <><circle cx="12" cy="12" r="8.5" /><path d="M9.5 9.5c0-1 1-1.5 2.5-1.5s2.5.5 2.5 1.5-1 1.5-2.5 1.5-2.5.5-2.5 1.5 1 1.5 2.5 1.5 2.5-.5 2.5-1.5" /><path d="M12 7v1.5M12 15.5V17" /></>,
        chevron: <path d="m6 9 6 6 6-6" />,
        search: <><circle cx="11" cy="11" r="6.5" /><path d="m20 20-3.5-3.5" /></>,
        filter: <path d="M4 5h16l-6 8v5l-4 2v-7L4 5Z" />,
        check: <path d="M5 12.5 10 17.5 19 7.5" />,
        x: <><path d="M6 6l12 12" /><path d="M18 6 6 18" /></>,
        pencil: <><path d="M4 20h4l10-10-4-4L4 16v4Z" /><path d="m14.5 5.5 4 4" /></>,
        archive: <><rect x="3" y="4" width="18" height="4" rx="1" /><path d="M5 8v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8" /><path d="M10 12h4" /></>,
        refresh: <><path d="M20 12a8 8 0 1 1-2.3-5.6" /><path d="M20 4v4h-4" /></>,
        radio: <><circle cx="12" cy="12" r="3.5" /><path d="M6.3 6.3a8 8 0 0 0 0 11.4M17.7 6.3a8 8 0 0 1 0 11.4" /><path d="M3.5 3.5a12 12 0 0 0 0 17M20.5 3.5a12 12 0 0 1 0 17" /></>,
        clock: <><circle cx="12" cy="12" r="8.5" /><path d="M12 7.5V12l3 2" /></>,
        info: <><circle cx="12" cy="12" r="8.5" /><path d="M12 11v5.5" /><circle cx="12" cy="8" r="0.8" fill="currentColor" /></>,
      };
      return (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"
             strokeLinecap="round" strokeLinejoin="round" className={className}>
          {paths[name] || null}
        </svg>
      );
    };

    const Sparkline = ({ points, stroke = 'stroke-indigo-500' }) => {
      if (!points || !points.length) return null;
      const w = 80, h = 24;
      const min = Math.min(...points), max = Math.max(...points);
      const range = max - min || 1;
      const step = w / (points.length - 1);
      const d = points.map((p, i) => {
        const x = i * step;
        const y = h - ((p - min) / range) * (h - 4) - 2;
        return `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ');
      return (
        <svg width={w} height={h} className={`sparkline ${stroke}`}>
          <path d={d} />
        </svg>
      );
    };

    const Pill = ({ children, className = '' }) => (
      <span className={`inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-medium ring-1 ring-inset ${className}`}>{children}</span>
    );

    const SubaccountChip = ({ id }) => {
      const s = SUB_BY_ID[id] || SUB_BY_ID.all;
      return (
        <Pill className="bg-white text-slate-700 ring-slate-200">
          <span className={`w-1.5 h-1.5 rounded-full ${s.dot}`} />
          {s.name}
        </Pill>
      );
    };

    /* === COMPONENTS === */
    const Sidebar = () => {
      const items = [
        { label: 'Pulse', icon: 'radio', active: true },
        { label: 'Clients', icon: 'database' },
        { label: 'Agents', icon: 'radio' },
        { label: 'Playbooks', icon: 'doc' },
        { label: 'Skills', icon: 'target' },
        { label: 'Insights', icon: 'clock', soon: true },
        { label: 'Settings', icon: 'filter' },
      ];
      return (
        <aside className="hidden md:flex md:flex-col w-56 shrink-0 bg-white border-r border-slate-200 px-3 py-4">
          <div className="flex items-center gap-2 px-2 pb-4 mb-2 border-b border-slate-100">
            <div className="w-7 h-7 rounded-md bg-indigo-600 flex items-center justify-center text-white font-semibold">S</div>
            <div className="text-sm font-semibold tracking-tight">Synthetos</div>
          </div>
          <nav className="flex-1 space-y-0.5">
            {items.map(i => (
              <a key={i.label} href="#"
                 className={`flex items-center gap-2.5 px-2.5 py-1.5 rounded-md text-sm ${i.active ? 'bg-indigo-50 text-indigo-700 font-medium' : 'text-slate-600 hover:bg-slate-50'}`}>
                <Icon name={i.icon} className="w-4 h-4" />
                <span>{i.label}</span>
                {i.soon && <span className="ml-auto text-[10px] uppercase tracking-wide text-slate-400">soon</span>}
              </a>
            ))}
          </nav>
          <div className="mt-4 pt-3 border-t border-slate-100 px-2 text-xs text-slate-400">
            Prototype · mock data
          </div>
        </aside>
      );
    };

    const Header = ({ scope, setScope }) => (
      <header className="bg-white border-b border-slate-200 px-6 py-3 flex items-center gap-4">
        <div>
          <div className="text-xs text-slate-500">Good morning, Sam</div>
          <div className="text-xl font-semibold tracking-tight">Pulse</div>
        </div>
        <div className="ml-6 flex items-center gap-2">
          <span className="text-xs text-slate-500">Viewing:</span>
          <select value={scope} onChange={e => setScope(e.target.value)}
                  className="text-sm px-2.5 py-1.5 rounded-md border border-slate-200 bg-white hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-300">
            {SUBACCOUNTS.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        </div>
        <div className="ml-auto flex items-center gap-2">
          <div className="relative">
            <Icon name="search" className="w-4 h-4 absolute left-2.5 top-2.5 text-slate-400" />
            <input placeholder="Search"
                   className="text-sm pl-8 pr-3 py-1.5 rounded-md border border-slate-200 bg-white w-56 focus:outline-none focus:ring-2 focus:ring-indigo-300" />
          </div>
          <button className="flex items-center gap-1.5 text-sm px-2.5 py-1.5 rounded-md border border-slate-200 bg-white hover:bg-slate-50">
            <Icon name="refresh" className="w-4 h-4" /> Refresh
          </button>
        </div>
      </header>
    );

    const OverviewStrip = ({ open, setOpen }) => (
      <section className="px-6 pt-4">
        <div className="rounded-xl bg-white border border-slate-200 card-shadow">
          <button onClick={() => setOpen(!open)}
                  className="w-full flex items-center gap-2 px-4 py-2.5 text-sm text-slate-600 hover:bg-slate-50 rounded-t-xl">
            <Icon name="chevron" className={`w-4 h-4 transition-transform ${open ? '' : '-rotate-90'}`} />
            <span className="font-medium">Overview · last 7 days</span>
            <span className="ml-auto text-xs text-slate-400">4 metrics · live</span>
          </button>
          {open && (
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-0 border-t border-slate-100">
              {METRICS.map((m, i) => (
                <div key={m.label}
                     className={`p-4 flex items-center justify-between ${i < METRICS.length - 1 ? 'sm:border-r border-slate-100' : ''}`}>
                  <div>
                    <div className="text-xs text-slate-500">{m.label}</div>
                    <div className="text-2xl font-semibold tracking-tight mt-1">{m.value}</div>
                    <div className={`text-xs mt-1 ${m.tone === 'up' ? 'text-emerald-600' : 'text-rose-600'}`}>{m.delta}</div>
                  </div>
                  <Sparkline points={m.spark} />
                </div>
              ))}
            </div>
          )}
        </div>
      </section>
    );

    const Tabs = ({ tab, setTab, attentionCount, historyCount }) => (
      <div className="px-6 pt-4">
        <div className="border-b border-slate-200 flex items-center gap-1">
          {[
            { id: 'attention', label: 'Attention', count: attentionCount },
            { id: 'history', label: 'History', count: historyCount },
          ].map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
                    className={`px-3 py-2 text-sm -mb-px border-b-2 ${tab === t.id ? 'border-indigo-600 text-indigo-700 font-medium' : 'border-transparent text-slate-600 hover:text-slate-900'}`}>
              {t.label}
              <span className={`ml-1.5 px-1.5 py-0.5 rounded text-xs ${tab === t.id ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-600'}`}>{t.count}</span>
            </button>
          ))}
          <div className="ml-auto text-xs text-slate-400 pb-2">Completed work moves to History automatically</div>
        </div>
      </div>
    );

    const FilterChip = ({ label, active, onToggle }) => (
      <button onClick={onToggle}
              className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs ring-1 ring-inset transition-colors
                ${active ? 'bg-indigo-600 text-white ring-indigo-600' : 'bg-white text-slate-600 ring-slate-200 hover:bg-slate-50'}`}>
        {label}
      </button>
    );

    const FilterRow = ({ typeFilter, setTypeFilter, laneFilter, setLaneFilter, onClear, anyActive }) => (
      <div className="px-6 pt-3 flex flex-wrap items-center gap-2">
        <Icon name="filter" className="w-4 h-4 text-slate-400" />
        <span className="text-xs text-slate-500 mr-1">Type</span>
        {[
          { id: null, label: 'All' },
          { id: 'review', label: 'Reviews' },
          { id: 'failed_run', label: 'Failed runs' },
          { id: 'task', label: 'Tasks' },
        ].map(t => <FilterChip key={String(t.id)} label={t.label} active={typeFilter === t.id} onToggle={() => setTypeFilter(t.id)} />)}
        <span className="mx-2 h-4 w-px bg-slate-200" />
        <span className="text-xs text-slate-500 mr-1">Lane</span>
        {[
          { id: null, label: 'All' },
          { id: 'client', label: 'Client-facing' },
          { id: 'internal', label: 'Internal' },
          { id: 'major', label: 'Major' },
        ].map(l => <FilterChip key={String(l.id)} label={l.label} active={laneFilter === l.id} onToggle={() => setLaneFilter(l.id)} />)}
        {anyActive && (
          <button onClick={onClear} className="ml-auto text-xs text-indigo-600 hover:text-indigo-700">Clear all</button>
        )}
      </div>
    );

    const EvidenceBlock = ({ evidence }) => {
      if (!evidence) return null;
      if (evidence.kind === 'email') {
        return (
          <div className="text-sm border border-slate-200 rounded-lg overflow-hidden bg-slate-50">
            <div className="grid grid-cols-[80px_1fr] gap-x-3 p-3 text-xs">
              <div className="text-slate-500">To</div><div className="font-medium">{evidence.to}</div>
              <div className="text-slate-500">Subject</div><div className="font-medium">{evidence.subject}</div>
            </div>
            <pre className="whitespace-pre-wrap p-3 text-sm bg-white border-t border-slate-200 font-sans leading-relaxed">{evidence.body}</pre>
          </div>
        );
      }
      if (evidence.kind === 'diff') {
        return (
          <div className="text-sm border border-slate-200 rounded-lg overflow-hidden">
            <div className="grid grid-cols-[1.5fr_1fr_1fr] text-xs bg-slate-50 text-slate-500 px-3 py-2 border-b border-slate-200">
              <div>Field</div><div>Current</div><div>Proposed</div>
            </div>
            {evidence.rows.map((r, i) => (
              <div key={i} className="grid grid-cols-[1.5fr_1fr_1fr] px-3 py-2 text-sm border-b last:border-b-0 border-slate-100">
                <div className="text-slate-700">{r.field}</div>
                <div className="text-slate-400">{r.from}</div>
                <div className="text-emerald-700 font-medium">{r.to}</div>
              </div>
            ))}
          </div>
        );
      }
      if (evidence.kind === 'metrics') {
        return (
          <div className="text-sm border border-slate-200 rounded-lg overflow-hidden bg-white">
            {evidence.rows.map((r, i) => (
              <div key={i} className="grid grid-cols-[1fr_1.4fr] px-3 py-2 text-sm border-b last:border-b-0 border-slate-100">
                <div className="text-slate-500">{r.label}</div>
                <div className="text-slate-800 font-medium">{r.value}</div>
              </div>
            ))}
          </div>
        );
      }
      return null;
    };

    const ActionBar = ({ laneId, acked, setAcked, ackText }) => {
      const primaryDisabled = laneId === 'major' && !acked;
      return (
        <div className="pt-3 border-t border-slate-100 flex flex-wrap items-center gap-2">
          {laneId === 'major' && (
            <label className="w-full flex items-start gap-2 p-2.5 rounded-md bg-amber-50 ring-1 ring-inset ring-amber-200 text-amber-900 text-xs">
              <input type="checkbox" checked={acked} onChange={e => setAcked(e.target.checked)}
                     className="mt-0.5 accent-amber-600" />
              <span>{ackText}</span>
            </label>
          )}
          <button disabled={primaryDisabled}
                  className={`inline-flex items-center gap-1.5 text-sm px-3 py-1.5 rounded-md font-medium transition-colors
                    ${primaryDisabled ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-indigo-600 text-white hover:bg-indigo-500'}`}>
            <Icon name="check" className="w-4 h-4" />
            {laneId === 'client' ? 'Approve with edits' : laneId === 'major' ? 'Approve & commit' : 'Approve'}
          </button>
          <button className="inline-flex items-center gap-1.5 text-sm px-3 py-1.5 rounded-md border border-slate-200 bg-white hover:bg-slate-50">
            <Icon name="pencil" className="w-4 h-4" /> Edit
          </button>
          <button className="inline-flex items-center gap-1.5 text-sm px-3 py-1.5 rounded-md border border-slate-200 bg-white hover:bg-slate-50 text-slate-700">
            <Icon name="x" className="w-4 h-4" /> Reject
          </button>
          <button className="ml-auto inline-flex items-center gap-1.5 text-xs px-2 py-1 rounded text-slate-500 hover:bg-slate-100">
            <Icon name="archive" className="w-3.5 h-3.5" /> Archive
          </button>
        </div>
      );
    };

    const Card = ({ item, laneId, expandedDefault = false }) => {
      const [open, setOpen] = useState(expandedDefault);
      const [acked, setAcked] = useState(false);
      const lane = LANE_BY_ID[laneId];
      return (
        <div className="bg-white rounded-xl border border-slate-200 card-shadow p-4">
          <div className="flex items-start gap-3">
            <div className={`w-9 h-9 rounded-lg flex items-center justify-center ring-1 ring-inset ${lane.chip}`}>
              <Icon name={item.icon} className="w-4 h-4" />
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-1.5 flex-wrap">
                <Pill className={lane.badge}>{lane.label}</Pill>
                <SubaccountChip id={item.subaccount} />
                <span className="text-xs text-slate-500">{item.agent}</span>
                <span className="ml-auto text-xs text-slate-400">{item.age} ago</span>
              </div>
              <div className="mt-1.5 text-[15px] font-medium text-slate-900 leading-snug">{item.title}</div>
              {item.reasoning && (
                <div className="mt-1 text-sm text-slate-600 leading-relaxed">{item.reasoning}</div>
              )}
              {item.cost && (
                <div className="mt-2 text-xs text-slate-500 flex items-center gap-1.5">
                  <Icon name="info" className="w-3.5 h-3.5" />
                  {item.cost}
                </div>
              )}
              <div className="mt-3">
                <button onClick={() => setOpen(!open)}
                        className="text-xs inline-flex items-center gap-1 text-indigo-600 hover:text-indigo-700">
                  <Icon name="chevron" className={`w-3.5 h-3.5 transition-transform ${open ? '' : '-rotate-90'}`} />
                  {open ? 'Hide evidence' : 'Show evidence'}
                </button>
              </div>
              {open && (
                <div className="mt-3">
                  <EvidenceBlock evidence={item.evidence} />
                </div>
              )}
              {(laneId === 'client' || laneId === 'major') && (
                <ActionBar laneId={laneId} acked={acked} setAcked={setAcked} ackText={item.acknowledgment} />
              )}
            </div>
          </div>
        </div>
      );
    };

    const QuickRow = ({ item }) => (
      <div className="flex items-center gap-3 px-3 py-2.5 bg-white rounded-lg border border-slate-200 hover:bg-slate-50">
        <Icon name={item.icon} className="w-4 h-4 text-slate-400" />
        <div className="flex-1 min-w-0">
          <div className="text-sm text-slate-800 truncate">{item.title}</div>
          <div className="flex items-center gap-1.5 mt-0.5">
            <SubaccountChip id={item.subaccount} />
            <span className="text-xs text-slate-500">{item.agent} · {item.age} ago</span>
          </div>
        </div>
        <button className="text-xs px-2.5 py-1 rounded bg-indigo-600 text-white hover:bg-indigo-500">Approve</button>
        <button className="text-xs px-2 py-1 rounded border border-slate-200 text-slate-600 hover:bg-slate-50">Open</button>
      </div>
    );

    const Lane = ({ laneId, items, defaultExpanded }) => {
      const lane = LANE_BY_ID[laneId];
      if (!items.length) return null;
      return (
        <section className={`rounded-xl border border-slate-200 bg-gradient-to-b ${lane.tint} lane-shadow p-4`}>
          <div className="flex items-center gap-2 mb-3">
            <Pill className={lane.badge}>{lane.label}</Pill>
            <span className="text-xs text-slate-500">{items.length} {items.length === 1 ? 'item' : 'items'}</span>
            <span className="text-xs text-slate-500 ml-2 hidden sm:inline">· {lane.description}</span>
          </div>
          <div className={`grid gap-2 ${laneId === 'internal' ? 'grid-cols-1' : 'grid-cols-1'}`}>
            {items.map(item => (
              laneId === 'internal'
                ? <QuickRow key={item.id} item={item} />
                : <Card key={item.id} item={item} laneId={laneId} expandedDefault={defaultExpanded} />
            ))}
          </div>
        </section>
      );
    };

    const HistoryTable = ({ rows }) => (
      <div className="bg-white rounded-xl border border-slate-200 card-shadow overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-xs text-slate-500">
            <tr>
              <th className="text-left font-medium px-4 py-2.5">Type</th>
              <th className="text-left font-medium px-4 py-2.5">Status</th>
              <th className="text-left font-medium px-4 py-2.5">Subject</th>
              <th className="text-left font-medium px-4 py-2.5">Actor</th>
              <th className="text-left font-medium px-4 py-2.5">Severity</th>
              <th className="text-left font-medium px-4 py-2.5">Subaccount</th>
              <th className="text-left font-medium px-4 py-2.5">When</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((r, i) => (
              <tr key={i} className="border-t border-slate-100 hover:bg-slate-50">
                <td className="px-4 py-2.5"><Pill className="bg-slate-100 text-slate-700 ring-slate-200">{r.type}</Pill></td>
                <td className="px-4 py-2.5 text-slate-700">{r.status}</td>
                <td className="px-4 py-2.5 font-medium text-slate-900">{r.subject}</td>
                <td className="px-4 py-2.5 text-slate-600">{r.actor}</td>
                <td className="px-4 py-2.5 text-slate-500">{r.severity}</td>
                <td className="px-4 py-2.5"><SubaccountChip id={r.subaccount} /></td>
                <td className="px-4 py-2.5 text-slate-500">{r.when}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );

    const App = () => {
      const [scope, setScope] = useState('all');
      const [overviewOpen, setOverviewOpen] = useState(true);
      const [tab, setTab] = useState('attention');
      const [typeFilter, setTypeFilter] = useState(null);
      const [laneFilter, setLaneFilter] = useState(null);

      const byScope = useMemo(() => {
        const match = (arr) => scope === 'all' ? arr : arr.filter(x => x.subaccount === scope || x.subaccount === 'all');
        return {
          client: match(CLIENT_FACING),
          internal: match(INTERNAL),
          major: match(MAJOR),
          history: scope === 'all' ? HISTORY : HISTORY.filter(r => r.subaccount === scope),
        };
      }, [scope]);

      const byType = (arr) => typeFilter ? arr.filter(x => x.type === typeFilter) : arr;
      const filtered = {
        client: (!laneFilter || laneFilter === 'client') ? byType(byScope.client) : [],
        internal: (!laneFilter || laneFilter === 'internal') ? byType(byScope.internal) : [],
        major: (!laneFilter || laneFilter === 'major') ? byType(byScope.major) : [],
      };
      const attentionCount = filtered.client.length + filtered.internal.length + filtered.major.length;
      const anyActive = typeFilter !== null || laneFilter !== null;

      return (
        <div className="min-h-screen flex">
          <Sidebar />
          <main className="flex-1 min-w-0 flex flex-col">
            <Header scope={scope} setScope={setScope} />
            <OverviewStrip open={overviewOpen} setOpen={setOverviewOpen} />
            <Tabs tab={tab} setTab={setTab}
                  attentionCount={attentionCount}
                  historyCount={byScope.history.length} />
            {tab === 'attention' && (
              <>
                <FilterRow typeFilter={typeFilter} setTypeFilter={setTypeFilter}
                           laneFilter={laneFilter} setLaneFilter={setLaneFilter}
                           anyActive={anyActive}
                           onClear={() => { setTypeFilter(null); setLaneFilter(null); }} />
                <div className="px-6 py-4 space-y-4">
                  {attentionCount === 0 && (
                    <div className="bg-white rounded-xl border border-dashed border-slate-300 p-10 text-center text-slate-500">
                      Nothing needs attention under the current filters.
                    </div>
                  )}
                  <Lane laneId="client" items={filtered.client} defaultExpanded={false} />
                  <Lane laneId="major" items={filtered.major} defaultExpanded={false} />
                  <Lane laneId="internal" items={filtered.internal} defaultExpanded={false} />
                </div>
              </>
            )}
            {tab === 'history' && (
              <div className="px-6 py-4">
                <HistoryTable rows={byScope.history} />
              </div>
            )}
            <footer className="px-6 py-6 text-xs text-slate-400 border-t border-slate-100 bg-white">
              Synthetos · Pulse prototype · lane naming: Client-facing / Internal / Major · feed ranking engine deferred to v1.1
            </footer>
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
