<!doctype html>
<!--
  Mock 3 / 10 — Workflow Run Modal (mode selection)
  ===================================================
  Primary user task: run this Workflow, picking how safely to run it.
  Simplified per docs/frontend-design-principles.md:
    - manual-run variant only; scheduled-run disabled variant removed (noted in text)
    - no "2 side-effecting steps" preview tile (data-model leak)
    - no step-progress dashboard at the top — progress is implicit in the title
    - two radio choices, one "Run" button, done
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Mock 3 — Workflow Run Modal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: rgba(15,23,42,0.55); }
  .opt input[type="radio"]:checked + .opt-card { border-color: #6366f1; background: #eef2ff; }
  .opt input[type="radio"]:checked + .opt-card .dot { background:#6366f1; border-color:#6366f1; }
  .opt input[type="radio"]:checked + .opt-card .dot::after { content:''; width:6px; height:6px; border-radius:50%; background:white; }
  .dot { width:16px; height:16px; border-radius:50%; border:2px solid #cbd5e1; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 120ms; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-[480px]">
  <div class="flex justify-between items-baseline mb-4 text-[13px]">
    <h1 class="text-[15px] font-semibold text-white">Mock 3 · Run Workflow</h1>
    <a href="index.html" class="text-indigo-200 hover:text-white no-underline">← All mocks</a>
  </div>

  <!-- Modal -->
  <div class="bg-white rounded-2xl shadow-[0_24px_64px_rgba(0,0,0,0.35)] overflow-hidden">
    <!-- Header -->
    <div class="flex justify-between items-center px-6 py-5 border-b border-slate-100">
      <div>
        <div class="text-[15px] font-bold text-slate-900">Run Workflow</div>
        <div class="text-[12px] text-slate-500">Weekly Lead Re-engagement</div>
      </div>
      <button class="w-7 h-7 rounded-md bg-slate-100 hover:bg-slate-200 text-slate-500">×</button>
    </div>

    <!-- Body -->
    <div class="px-6 pt-5 pb-5">
      <h3 class="text-[14px] font-semibold text-slate-900">How should this run?</h3>

      <div class="mt-4 space-y-2.5">
        <label class="opt block cursor-pointer">
          <input type="radio" name="m" value="explore" checked class="hidden peer" />
          <div class="opt-card p-3.5 border border-slate-200 rounded-lg flex items-start gap-3 transition-all">
            <div class="dot mt-0.5"></div>
            <div class="flex-1">
              <div class="text-[13.5px] font-semibold text-slate-900">Explore — review each action</div>
              <div class="text-[12px] text-slate-500 mt-0.5">Nothing outside this app changes until you approve it.</div>
            </div>
          </div>
        </label>

        <label class="opt block cursor-pointer">
          <input type="radio" name="m" value="execute" class="hidden peer" />
          <div class="opt-card p-3.5 border border-slate-200 rounded-lg flex items-start gap-3 transition-all">
            <div class="dot mt-0.5"></div>
            <div class="flex-1">
              <div class="text-[13.5px] font-semibold text-slate-900">Execute — run straight through</div>
              <div class="text-[12px] text-slate-500 mt-0.5">Auto-gated steps run without asking.</div>
            </div>
          </div>
        </label>
      </div>
    </div>

    <!-- Footer -->
    <div class="px-6 py-4 border-t border-slate-100 flex justify-end gap-2">
      <button class="px-4 py-2 bg-white hover:bg-slate-50 text-slate-700 text-[13px] font-semibold rounded-lg border border-slate-300">Cancel</button>
      <button class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-[13px] font-semibold rounded-lg">Run</button>
    </div>
  </div>

  <p class="text-[12px] text-indigo-100 mt-4 leading-relaxed">
    Scheduled runs skip this step — schedules always run in Execute Mode (no human available to approve). Handled server-side; no disabled-state UI variant.
  </p>
</div>

</body>
</html>
