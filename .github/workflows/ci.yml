name: CI

on:
  pull_request:
    types: [opened, reopened, ready_for_review, labeled, synchronize]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit_tests:
    name: unit tests
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'ready-to-merge')
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: automation_os_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/automation_os_test
      JWT_SECRET: ci-throwaway-jwt-secret-at-least-32-chars
      EMAIL_FROM: ci@automation-os.local
      NODE_ENV: test
      SYSTEM_INCIDENT_IDEMPOTENCY_TTL_SECONDS: '0.1'
      SYSTEM_INCIDENT_THROTTLE_MS: '100'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Verify workspace-actor coverage (Phase A gate)
        run: npx tsx scripts/verify-workspace-actor-coverage.ts

      - name: Run tests
        env:
          # Enable regression-only mode on the static gate suite — fails only
          # when a guard's current violation count exceeds its baseline in
          # `scripts/guard-baselines.json`. Without this, every gate exits
          # non-zero on the slightest count > 0, which is the wrong gate
          # semantic for a programme that lands gates incrementally and
          # tightens baselines over time. See `scripts/lib/guard-utils.sh`
          # `check_baseline()` for the contract.
          GUARD_BASELINE: 'true'
        run: npm test

  integration_tests:
    # Same image, same DB, NODE_ENV=integration. Surfaces the ~36 tests
    # gated on `process.env.NODE_ENV === 'integration'` (real-DB exactly-once,
    # idempotency races, RLS propagation). Load-bearing — failures block
    # merge on a `ready-to-merge` PR (TI-005 closeout, branch
    # claude/integration-tests-fix-2026-04-30).
    name: integration tests
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'ready-to-merge')
    timeout-minutes: 10

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: automation_os_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Migrations + fixture seeding run as the `postgres` superuser via
      # DATABASE_URL. The test runner itself connects as `synthetos_app`
      # (NOBYPASSRLS) via DATABASE_URL_TEST so every RLS policy actually
      # fires during the integration suite — closes TI-008.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/automation_os_test
      DATABASE_URL_TEST: postgres://synthetos_app:synthetos_app@localhost:5432/automation_os_test
      JWT_SECRET: ci-throwaway-jwt-secret-at-least-32-chars
      EMAIL_FROM: ci@automation-os.local
      NODE_ENV: integration
      SYSTEM_INCIDENT_IDEMPOTENCY_TTL_SECONDS: '0.1'
      SYSTEM_INCIDENT_THROTTLE_MS: '100'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Set synthetos_app password (CI only)
        # Migration 0364 creates the synthetos_app role WITHOUT a password.
        # Test/dev CI scripts (this step) and production secrets management
        # are responsible for assigning one out-of-band. The literal here is
        # only the CI throwaway value baked into DATABASE_URL_TEST above.
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d automation_os_test \
            -c "ALTER ROLE synthetos_app WITH PASSWORD 'synthetos_app';"

      - name: Seed integration fixtures
        run: npx tsx scripts/seed-integration-fixtures.ts

      - name: Run integration tests
        # NOTE: TI-008 closure (run integration tests as `synthetos_app` so
        # RLS policies fire under non-superuser auth) is deferred. The many
        # service-layer integration tests call production code that expects
        # the per-request `app.organisation_id` GUC to be set by middleware
        # — switching to synthetos_app surfaces that gap as 10+ test
        # failures. Tracked as wave-5 follow-up in tasks/todo.md
        # (TI-008-FOLLOWUP). For now the test runner uses the superuser
        # DATABASE_URL (same as pre-wave-4 main) so the integration_tests
        # job remains a useful merge gate while the GUC plumbing lands.
        run: npx vitest run

  lint_and_typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  grep_invariants:
    # Phase 3 — B.1–B.4 structural grep gates. No DB or Node required; pure bash.
    # Runs unconditionally on every PR so regressions are caught before ready-to-merge.
    name: Grep invariants (Phase 3 B.1-B.4)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: B.1 Assert-active guard (soft-deletable table queries)
        run: bash scripts/verify-assert-active.sh

      - name: B.2 No raw console calls in server/
        run: bash scripts/verify-no-raw-console.sh

      - name: B.3 Rate-limit key normalisation (no NormalisedEmail cast bypass)
        run: bash scripts/verify-rate-limit-key-normalisation.sh

      - name: B.4 Audit event namespace (no raw eventType strings)
        run: bash scripts/verify-audit-event-namespace.sh

      - name: "B.5 Operator session consents immutability (R3)"
        run: bash scripts/verify-operator-session-consent-immutable.sh

      - name: "B.6 Operator session token redaction (§17.9)"
        run: bash scripts/verify-operator-session-token-redaction.sh

      - name: "E.6 Skill error envelope (return paths must include ok: field)"
        run: bash scripts/verify-skill-error-envelope.sh

      # Spec B (sandbox-isolation) — five structural gates added in C14.
      # All run unconditionally on every PR. The template-version-coherence
      # gate runs in STRICT mode (hard-fails on missing publish tags for
      # non-local-dev-* versions) only on ready-to-merge so PR iteration
      # remains unblocked until the operator pushes a publish tag.
      - name: "Spec B: sandbox classification routes through SandboxExecutionService.runTask"
        run: bash scripts/gates/verify-sandbox-classification.sh

      - name: "Spec B: sandbox minimum-events emitted by service layer"
        run: bash scripts/gates/verify-sandbox-minimum-events.sh

      - name: "Spec B: no UPDATE against sandbox cost-ledger rows (§12.4 insert-only)"
        run: bash scripts/gates/verify-no-sandbox-cost-update.sh

      - name: "Spec B: no inlineSandbox import outside test files"
        run: bash scripts/gates/verify-no-inline-sandbox-outside-test.sh

      - name: "Spec B: sandbox template version coherence (strict on ready-to-merge)"
        env:
          # Strict mode = hard-fail when CURRENT_VERSION.version is not
          # local-dev-* and no matching `sandbox-template/{name}/v{version}`
          # tag exists. Only enforced on ready-to-merge so WIP branches can
          # iterate on CURRENT_VERSION before tag push.
          STRICT_TEMPLATE_TAG_CHECK: ${{ contains(github.event.pull_request.labels.*.name, 'ready-to-merge') && '1' || '0' }}
        run: bash scripts/gates/verify-template-version-coherence.sh

      # Operator Backend (§ 3.2 item 2) — single-source-of-truth gate for the
      # 'long_running' and 'session_identity' ExecutionCapability literals.
      # Enforces that these literals only appear in the canonical definition
      # (types.ts), adapter declarations, test fixtures, and documentation.
      - name: "Operator Backend: ExecutionCapability literals confined to canonical sites (§ 3.2)"
        run: bash scripts/gates/verify-execution-capability-references.sh

      # Operator Backend (§ 4.7) — event-registry namespace discipline gate.
      # Enforces that naked 'operator-session.*' string literals only appear in
      # the registry file (shared/types/operatorBackendEvents.ts), test fixtures,
      # and documentation. All other call sites must import from the registry.
      - name: "Operator Backend: operator-session.* literals confined to event registry (§ 4.7)"
        run: bash scripts/gates/verify-operator-event-registry.sh

      # Operator Backend (§ 3.14 item 10) — checkpoint-payload logging ban.
      # Bans logger/console calls that reference checkpoint_payload. The payload
      # is encrypted at rest and contains sensitive session state (page URLs,
      # screenshots, conversation history) that must never leak into logs.
      - name: "Operator Backend: no logger/console reference to checkpoint_payload (§ 3.14)"
        run: bash scripts/gates/verify-no-checkpoint-logging.sh

  portable_framework_tests:
    # Runs the portable bundle's test suite (113 node:test tests) on every
    # PR, unconditional. Without this, the sync engine in setup/portable/
    # can regress silently — the rest of the repo's tests don't reach into
    # setup/portable/ (vitest only includes **/__tests__/**/*.test.ts).
    # See tasks/builds/framework-standalone-repo/spec.md and the chatgpt-pr-review
    # Round 2 finding F3 that motivated this gate.
    name: Portable framework tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:portable-framework
