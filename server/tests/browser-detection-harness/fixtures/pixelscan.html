<!DOCTYPE html>
<html lang="en">
<head>

  <title>PixelScan - Browser Fingerprint Consistency</title>
</head>
<body>

    <h2>Fingerprint Analysis</h2>
    <div class="verdict">
      <span class="status consistent">Consistent</span>

      <li>Canvas fingerprint: Consistent</li>
      <li>WebGL fingerprint: Consistent</li>

      <li>Font list: Consistent</li>
    </ul>
  </div>
</body>
