# ─────────────────────────────────────────────────────────────────────────────
# AutomationOS — local development Docker Compose
# Spec: docs/iee-development-spec.md §12, tasks/windows-iee-setup-guide.md
#
# Two services run locally:
#   • app       — main AutomationOS server (mirrors Replit in production)
#   • worker    — IEE worker (mirrors DigitalOcean VPS in production)
#
# Postgres is NOT in compose. Both services connect to the native Windows
# Postgres install via host.docker.internal. The worker is the only component
# that runs on the production VPS; locally we run app + worker against a
# single Postgres instance so the full execution loop can be exercised
# end-to-end exactly as it will work in production.
#
# Note: top-level `version:` field omitted — deprecated in Docker Compose v2.
# ─────────────────────────────────────────────────────────────────────────────

# Explicit project name so the stack is `automation_os` regardless of which
# directory the repo is checked out into. Without this, Compose derives the
# project name from the parent folder (e.g. `automation-v1`), which causes
# container/volume names to drift between machines.
name: automation_os

services:

  # NOTE: The bundled `postgres` service is disabled. We connect to the host
  # Windows Postgres (which holds the real, populated database) via
  # `host.docker.internal`. To re-enable a containerised Postgres, restore the
  # service block and revert the DATABASE_URL overrides below.

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"   # Express API server
      - "5000:5000"   # Vite dev server (the frontend — open this in your browser)
    env_file: .env
    environment:
      # Connect to the host Windows Postgres. Inside the container `localhost`
      # means the container itself, so we override the .env value.
      DATABASE_URL: postgresql://postgres:Tyeahzilly!32@host.docker.internal:5432/automation_os
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:Tyeahzilly!32@host.docker.internal:5432/automation_os
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Persistent browser sessions survive container restarts.
      # Spec §6.2 / §13.6.
      - worker_sessions:/var/browser-sessions
    restart: unless-stopped
    # ── Resource limits (reviewer round 2) ──────────────────────────────────
    # Prevents a runaway dev command or a Playwright leak from starving the
    # host. Conservative defaults; adjust per environment via env vars on
    # the production VPS. Cgroup-level isolation is intentionally NOT in v1
    # (no Firejail / gVisor / DinD) per spec §15.
    mem_limit: ${IEE_WORKER_MEM_LIMIT:-3g}
    mem_reservation: ${IEE_WORKER_MEM_RESERVATION:-1g}
    cpus: ${IEE_WORKER_CPUS:-2}
    pids_limit: 256

volumes:
  worker_sessions:
