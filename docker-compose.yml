# ─────────────────────────────────────────────────────────────────────────────
# AutomationOS — local development Docker Compose
# Spec: docs/iee-development-spec.md §12, tasks/windows-iee-setup-guide.md
#
# One service runs locally:
#   • app       — main AutomationOS server (mirrors Replit in production)
#
# Postgres is NOT in compose; app connects to the native Windows Postgres
# install via host.docker.internal.
#
# The IEE worker previously ran as a `worker` Compose service backed by
# `worker/Dockerfile`. As of the IEE-on-e2b migration (tasks/builds/iee-
# browser-on-e2b/), IEE workloads execute inside e2b sandboxes in
# production; the worker Dockerfile was deleted and CI enforces its
# absence via `scripts/gates/verify-no-do-references.sh`. The local
# worker entry point at `worker/src/index.ts` remains for direct dev
# execution (`npx tsx worker/src/index.ts`) and the dev/cost-rollup
# pg-boss handlers still register against the local Postgres instance.
#
# Note: top-level `version:` field omitted — deprecated in Docker Compose v2.
# ─────────────────────────────────────────────────────────────────────────────

# Explicit project name so the stack is `automation_os` regardless of which
# directory the repo is checked out into. Without this, Compose derives the
# project name from the parent folder (e.g. `automation-v1`), which causes
# container/volume names to drift between machines.
name: automation_os

services:

  # NOTE: The bundled `postgres` service is disabled. We connect to the host
  # Windows Postgres (which holds the real, populated database) via
  # `host.docker.internal`. To re-enable a containerised Postgres, restore the
  # service block and revert the DATABASE_URL overrides below.

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"   # Express API server
      - "5000:5000"   # Vite dev server (the frontend — open this in your browser)
    env_file: .env
    environment:
      # Connect to the host Windows Postgres. Inside the container `localhost`
      # means the container itself, so we override the .env value.
      DATABASE_URL: postgresql://postgres:Tyeahzilly!32@host.docker.internal:5432/automation_os
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  # NOTE: The bundled `worker` service has been removed. Its Dockerfile
  # (`worker/Dockerfile`) was deleted by the IEE-on-e2b migration; CI gate
  # `scripts/gates/verify-no-do-references.sh` enforces its absence. Production
  # IEE workloads now run inside e2b sandboxes. For local development of
  # worker code, run the entry point directly:
  #
  #   npx tsx worker/src/index.ts
  #
  # The `worker_sessions` named volume was likewise removed — browser profile
  # state in production lives on e2b-managed volumes, tracked by the
  # `iee_browser_session_profiles` table (migration 0345).
